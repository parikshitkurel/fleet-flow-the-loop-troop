<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login page</title>
    <link rel="stylesheet" href="/admin copy/admin-login/dlogin.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    </head>
<body>
    <div class="wrapper">
        <form id="adminLoginForm">
            <h1>Admin login</h1>
            <div class="input-box">
                <input type="text" id="adminId" placeholder="Admin ID" required />
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="adminPin" placeholder="Admin Pin" required />
                <i class='bx bxs-lock'></i>
            </div>
            <div class="button-row">
                <button type="submit" class="btn login-btn">Login</button>
                <button type="button" onclick="back()" class="btn back-btn">Back</button>
            </div>

        </form>
    </div>
    <script src="/admin copy/admin-login/dlogin.js"></script>
</body>
</html>
